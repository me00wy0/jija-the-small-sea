
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Tidal Whiskers</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500&family=Cormorant+Garamond:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:"Cormorant Garamond",serif;
}

#game{

width:100vw;
height:100vh;

position:relative;

overflow:hidden;

background:

radial-gradient(
circle at 20% 15%,
rgba(255,245,255,.28),
transparent 35%
),

radial-gradient(
circle at 80% 25%,
rgba(180,220,255,.20),
transparent 40%
),

radial-gradient(
circle at 50% 60%,
rgba(255,210,235,.12),
transparent 50%
),

linear-gradient(
to bottom,

#313B8E 0%,

#648EFF 18%,

#90B9FF 36%,

#D0AEFF 58%,

#FFB8E8 80%,

#FFF0F6 100%

);

animation:
oceanGlow 8s infinite ease-in-out;

}
@keyframes oceanGlow{

0%,100%{

filter:
brightness(1);

}

50%{

filter:
brightness(1.08)
saturate(1.12);

}

}

@keyframes float{

50%{

transform:
translateY(-8px);

}

}

@keyframes subtitleFloat{

50%{

transform:
translateY(-3px);

}

}

.rays{

position:absolute;

inset:0;

pointer-events:none;

background:

repeating-linear-gradient(

120deg,

rgba(255,255,255,.03),

rgba(255,255,255,.03) 2px,

transparent 2px,

transparent 100px

);

animation:
rays 14s linear infinite;

}

@keyframes rays{

to{

transform:
translateY(50px);

}

}
/* intro */

#intro{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:100;

}

.title{

font-family:
"Pacifico",
cursive;

font-size:76px;

color:#FFF7FF;

text-align:center;

letter-spacing:1px;

line-height:1.05;

text-shadow:

0 0 12px rgba(255,255,255,.45),

0 0 25px rgba(240,180,255,.55),

0 4px 16px rgba(90,80,180,.25);

animation:
float 5s infinite ease-in-out;

}

.subtitle{

margin-top:16px;

font-family:
"Quicksand",
sans-serif;

font-size:24px;

font-weight:500;

letter-spacing:4px;

color:

rgba(
255,
245,
252,
0.95
);

text-shadow:

0 0 12px
rgba(
255,
220,
245,
0.35
);

animation:
subtitleFloat
4s infinite ease-in-out;

}

.creator{

position:static;

margin-top:4px;

margin-bottom:8px;

font-family:"Great Vibes",cursive;

font-size:34px;

color:#FFF7FF;

opacity:.9;

text-shadow:
0 0 10px rgba(255,255,255,.4);

}

.play{

margin-top:20px;

padding:16px 60px;

border:none;

border-radius:999px;

font-size:20px;

cursor:pointer;

background:
linear-gradient(
135deg,
#FFD0E9,
#B7C8FF
);

color:#5B4F82;

box-shadow:
0 8px 20px rgba(120,120,255,.25);

transition:.3s;

}

.play:hover{

transform:
translateY(-3px)
scale(1.03);

}

/* HUD */

#hud{

display:none;

position:absolute;

top:20px;

left:20px;

z-index:30;

color:white;

font-size:26px;

}

/* cat */

#cat{

position:absolute;

bottom:110px;

left:50%;

transform:
translateX(-50%);

font-size:74px;

z-index:25;

transition:
transform .12s;

animation:
swim 0.35s infinite ease-in-out;

}

/* fish */

.fish{

position:absolute;

font-size:38px;

}

/* coral */

.coral{

position:absolute;

bottom:70px;

width:100%;

font-size:56px;

opacity:.45;

text-align:center;

animation:
coral 6s infinite ease-in-out;

}

@keyframes coral{

50%{

transform:
translateY(-5px);

}

}

/* floor */

.floor{

position:absolute;

bottom:0;

width:100%;

height:100px;

background:

linear-gradient(
#D8C5A4,
#C9B08B
);

}

/* popup */

#popupText{

font-size:22px;

margin-top:10px;

line-height:1.5;

}

#popup{

display:none;

position:absolute;

inset:0;

justify-content:center;

align-items:center;

background:
rgba(0,0,0,.35);

z-index:999;

}

#popupTitle{

font-family:"Pacifico",cursive;

font-size:38px;

margin-bottom:15px;

color:#7A6CCF;

}

.card{

background:
linear-gradient(
180deg,
rgba(255,250,253,.98),
rgba(244,247,255,.96)
);

padding:45px;

border-radius:35px;

text-align:center;

color:#5B4F82;

box-shadow:
0 15px 40px rgba(0,0,0,.18);

border:
3px solid rgba(255,255,255,.5);

min-width:350px;

}

.card button{

margin-top:25px;

padding:14px 36px;

border:none;

border-radius:999px;

cursor:pointer;

font-size:18px;

font-weight:bold;

background:
linear-gradient(
135deg,
#FFD7EC,
#C8D8FF
);

color:#5B4F82;

box-shadow:
0 6px 18px rgba(140,120,255,.25);

transition:.3s;

}

.card button:hover{

transform:
translateY(-2px)
scale(1.05);

}

/* bubbles */

.bubble{

position:absolute;

opacity:.28;

animation:
bubble linear infinite;

}

@keyframes swim{

0%{

transform:
translateX(-50%)
translateY(0)
rotate(-2deg);

}

50%{

transform:
translateX(-50%)
translateY(-6px)
rotate(2deg);

}

100%{

transform:
translateX(-50%)
translateY(0)
rotate(-2deg);

}

}

@keyframes bubble{

from{

transform:
translateY(110vh);

opacity:0;

}

20%{

opacity:.4;

}

to{

transform:
translateY(-120vh);

opacity:0;

}

}

/* glow */

.glow{

position:absolute;

width:120px;

height:120px;

border-radius:50%;

background:

radial-gradient(
circle,
rgba(255,245,210,.7),
transparent
);

animation:
glow .5s forwards;

}

@keyframes glow{

to{

opacity:0;

transform:
scale(2);

}

}

@media(max-width:700px){

.title{

font-size:40px;

}

.subtitle{

font-size:16px;

}

#cat{

position:absolute;

bottom:110px;

left:50%;

transform:
translateX(-50%);

font-size:72px;

z-index:25;

animation:
catSwim .45s infinite ease-in-out;

filter:
drop-shadow(
0 0 10px
rgba(255,240,255,.35)
);

}
@keyframes catSwim{

0%{

transform:
translateX(-50%)
rotate(-3deg)
translateY(0);

}

25%{

transform:
translateX(-50%)
rotate(2deg)
translateY(-3px);

}

50%{

transform:
translateX(-50%)
rotate(-2deg)
translateY(0);

}

75%{

transform:
translateX(-50%)
rotate(2deg)
translateY(-4px);

}

100%{

transform:
translateX(-50%)
rotate(-3deg)
translateY(0);

}

}

}

</style>
</head>

<body>

<audio
id="bgMusic"
loop>

<source
src="ocean-song.mp3"
type="audio/mpeg">

</audio>


<div id="game">

<div class="rays"></div>

<div id="intro">

<div class="title">
Tidal Whiskers
</div>

<div class="subtitle">
beneath the tide
</div>

<div class="creator">
a small sea by jija
</div>

<button class="play" onclick="startGame()">
PLAY
</button>

</div>

</div>

<div id="hud">

<div id="score">
Score: 0
</div>

<div id="life">
🐚 🐚 🐚
</div>

</div>

<div id="cat">
🐈
</div>

<div class="coral">
🪸 🌿 🪸 🌾 🪸 🌿 🪸
</div>

<div class="floor"></div>

<div id="popup">

<div class="card">

<h1 id="popupTitle"></h1>

<p id="popupText"></p>

<button onclick="location.reload()">

🐈 Back To The Sea

</button>

</div>

</div>

</div>

<script>

const game=document.getElementById("game");

const cat=document.getElementById("cat");

const intro=document.getElementById("intro");

const hud=document.getElementById("hud");

const scoreText=document.getElementById("score");

const lifeText=document.getElementById("life");

const popup=document.getElementById("popup");

let running=false;

let score=0;

let lives=3;

let catX=window.innerWidth/2;

const catFrames=[
"🐱",
"🐱"
];

let catFrame=0;

setInterval(()=>{

if(!running)
return;

catFrame=
(
catFrame+1
)
%
catFrames.length;

cat.textContent=
catFrames[
catFrame
];

},250);

/* intro */

function startGame(){

intro.style.display=
"none";

hud.style.display=
"block";

document
.getElementById(
"bgMusic"
)
.volume=.35;

document
.getElementById(
"bgMusic"
)
.play()
.catch(()=>{});

running=true;

loop();

}

/* desktop */

document.addEventListener("keydown",(e)=>{

if(!running)return;

if(e.key==="ArrowLeft")catX-=40;

if(e.key==="ArrowRight")catX+=40;

moveCat();

});

/* mobile */

document.addEventListener("touchmove",(e)=>{

if(!running)return;

catX=e.touches[0].clientX;

moveCat();

});

function moveCat(){

catX=Math.max(
50,
Math.min(
window.innerWidth-70,
catX
)
);

cat.style.left=catX+"px";

}

/* spawn */

function loop(){

if(!running)return;

spawn();

setTimeout(loop,1200);

}

function spawn(){

const fish=document.createElement("div");

fish.className="fish";

const r=Math.random();

if(r<0.08)
fish.textContent="🪼";

else if(r<0.18)
fish.textContent="⭐";

else
fish.textContent="🐟";

let x=Math.random()*(window.innerWidth-80);

let y=-50;

fish.style.left=x+"px";

game.appendChild(fish);

const move=setInterval(()=>{

if(!running){

clearInterval(move);

return;

}

y+=1.3;

x+=Math.sin(y/60)*1.2;

fish.style.top=y+"px";

fish.style.left=x+"px";

const c=cat.getBoundingClientRect();

const f=fish.getBoundingClientRect();

if(

f.bottom>c.top &&

f.left<c.right &&

f.right>c.left

){

effect();

if(fish.textContent==="⭐")
score+=30;

else if(fish.textContent==="🪼")
lives--;

else
score+=10;

refresh();

fish.remove();

clearInterval(move);

}

if(y>window.innerHeight-120){

lives--;

refresh();

fish.remove();

clearInterval(move);

}

},20);

}

function effect(){

const g=document.createElement("div");

g.className="glow";

g.style.left=(catX-50)+"px";

g.style.bottom="80px";

game.appendChild(g);

setTimeout(()=>g.remove(),500);

}

function refresh(){

scoreText.textContent=
"Score: "+score;

lifeText.textContent=
"🐚 ".repeat(
Math.max(
0,
lives
)
);

if(lives<=0){

finish(
"The Sea Sleeps ",
"all the fishies have drifted away"
);

}

if(score>=300){

finish(
"OCEAN FEAST",
"tidal whiskers is full 🐈"
);

}

}

function finish(title,text){

running=false;

popup.style.display="flex";

document.getElementById(
"popupTitle"
).textContent=title;

document.getElementById(
"popupText"
).textContent=text;

}

/* bubbles */

for(let i=0;i<14;i++){

const b=document.createElement("div");

b.className="bubble";

b.innerHTML="🫧";

b.style.left=
Math.random()*100+"vw";

b.style.fontSize=
(12+Math.random()*25)+"px";

b.style.animationDuration=
(6+Math.random()*10)+"s";

game.appendChild(b);

}

</script>

</body>
</html>
```
